<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confie World | Offline AI</title>
    <style>
        :root {
            --bg-deep: #05070a; 
            --glow: #38bdf8; 
            --glass: rgba(255, 255, 255, 0.03);
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- Header --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px;
        }

        .status-capsule {
            background: linear-gradient(135deg, #38bdf8 0%, #34d399 100%);
            color: #000; padding: 6px 16px; border-radius: 20px;
            font-size: 11px; font-weight: 800; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .top-right { display: flex; align-items: center; gap: 15px; }

        .avatar {
            width: 36px; height: 36px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--glow); border: 1px solid var(--glow);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; cursor: pointer;
            transition: 0.1s;
        }
        .avatar:active { transform: scale(0.9); background: var(--glow); color: #000; }

        .menu-icon { opacity: 0.7; cursor: pointer; transition: 0.2s; }
        .menu-icon:hover { opacity: 1; color: var(--glow); }

        /* --- Main UI --- */
        .container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transform: translateY(-40px);
        }

        .logo {
            font-size: 80px; font-weight: 800; letter-spacing: -3px;
            margin-bottom: 40px; text-align: center; line-height: 0.9;
            text-shadow: 0 0 15px var(--glow), 0 0 30px var(--glow);
            animation: pulseGlow 3s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            from { text-shadow: 0 0 15px var(--glow), 0 0 30px var(--glow); }
            to { text-shadow: 0 0 20px var(--glow), 0 0 40px var(--glow); }
        }

        .search-box {
            width: 90%; max-width: 600px;
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px); padding: 14px 24px; border-radius: 30px;
            display: flex; align-items: center; gap: 15px;
            transition: 0.15s;
        }

        .search-box:focus-within {
            border-color: var(--glow);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .search-box input {
            background: none; border: none; outline: none;
            color: var(--text-main); flex: 1; font-size: 16px;
        }

        .btn-group { margin-top: 35px; display: flex; gap: 15px; }
        .btn {
            background: var(--glass); border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-sub); padding: 12px 28px; border-radius: 8px;
            cursor: pointer; font-size: 14px; transition: 0.1s;
        }
        .btn:active { transform: scale(0.95); background: rgba(56, 189, 248, 0.2); }

        /* --- Re-organized Snappy Menu --- */
        #dropMenu {
            position: fixed; top: 75px; right: 30px;
            background: rgba(10, 15, 25, 0.98);
            border: 1px solid var(--glow); border-radius: 12px;
            padding: 8px; display: none; flex-direction: column;
            width: 210px; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .menu-item {
            color: var(--text-main); text-decoration: none; font-size: 14px;
            padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px;
            transition: 0.1s;
        }
        .menu-item:hover { background: rgba(56, 189, 248, 0.1); color: var(--glow); }

        footer {
            padding: 20px; font-size: 12px; color: var(--text-sub);
            border-top: 1px solid rgba(255,255,255,0.03);
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="status-capsule">NODE: ENCRYPTED</div>
        <div class="top-right">
            <svg class="menu-icon" onclick="toggleMenu()" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/>
            </svg>
            <div class="avatar" onclick="toggleMenu()">CW</div>
        </div>
    </header>

    <div id="dropMenu">
        <a href="#" class="menu-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            User Profile
        </a>
        <a href="#" class="menu-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
            Mesh Transfers
        </a>
        <a href="#" class="menu-item">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            System Settings
        </a>
    </div>

    <div class="container">
        <div class="logo">Confie<br>World</div>
        
        <div class="search-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" placeholder="Search the secure mesh..." id="mainSearch">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
        </div>

        <div class="button-group">
            <button class="btn">Search Mesh</button>
            <button class="btn">Secure Protocol</button>
        </div>
    </div>

    <footer>
        <div style="opacity: 0.5;">Confie World • Resilient Information Mesh</div>
    </footer>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('dropMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }

        window.onclick = function(event) {
            if (!event.target.closest('.avatar') && !event.target.closest('.menu-icon')) {
                document.getElementById('dropMenu').style.display = 'none';
            }
        }
    </script>
</body>
</html>
